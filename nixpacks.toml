[phases.setup]
nixPkgs = ["python312", "postgresql"]

[phases.install]
cmds = [
  "cd backend",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd backend",
  "python manage.py collectstatic --noinput"
]

[start]
cmd = "cd backend && gunicorn tradeflow_api.wsgi --bind 0.0.0.0:${PORT:-8080}"
